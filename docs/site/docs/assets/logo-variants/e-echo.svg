<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sonda — echo">
  <title>Sonda — E. Echo</title>
  <!-- E. Echo: primary sine-S in currentColor + a faint, slightly offset
       second stroke in lime. Reads as a probe pulse with its return. -->
  <path d="M 56 14
           C 56 6, 16 6, 16 24
           C 16 42, 56 26, 56 44
           C 56 62, 16 62, 16 54"
        fill="none"
        stroke="#a3e635"
        stroke-width="5"
        stroke-linecap="round"
        opacity="0.45"/>
  <path d="M 52 12
           C 52 4, 12 4, 12 22
           C 12 40, 52 24, 52 42
           C 52 60, 12 60, 12 52"
        fill="none"
        stroke="currentColor"
        stroke-width="7"
        stroke-linecap="round"/>
</svg>
