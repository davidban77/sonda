<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sonda — square wave">
  <title>Sonda — D. Square-wave</title>
  <!-- D. Square-wave: built from right angles instead of curves — reads as
       a digital oscilloscope trace. Slight corner rounding via linejoin
       keeps it from feeling sharp/cold. -->
  <path d="M 52 12
           L 14 12
           L 14 32
           L 50 32
           L 50 52
           L 12 52"
        fill="none"
        stroke="currentColor"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
