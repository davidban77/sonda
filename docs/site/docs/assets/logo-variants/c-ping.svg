<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img" aria-label="Sonda — sine-S with ping">
  <title>Sonda — C. Sine + ping</title>
  <!-- C. Sine + ping: baseline sine-S plus a small lime "pulse" to the
       right, suggesting an active probe emitting a return. Wider viewBox
       (80x64) so the dot has room without crowding the stroke. -->
  <path d="M 52 12
           C 52 4, 12 4, 12 22
           C 12 40, 52 24, 52 42
           C 52 60, 12 60, 12 52"
        fill="none"
        stroke="currentColor"
        stroke-width="7"
        stroke-linecap="round"/>
  <circle cx="68" cy="52" r="5" fill="#a3e635"/>
  <!-- soft halo around the ping -->
  <circle cx="68" cy="52" r="9" fill="none" stroke="#a3e635"
          stroke-width="1.5" stroke-opacity="0.45"/>
</svg>
