site_name: Sonda
site_description: Synthetic telemetry generator for testing observability pipelines
site_url: https://davidban77.github.io/sonda/
repo_url: https://github.com/davidban77/sonda
repo_name: davidban77/sonda

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration:
    - Scenario Files: configuration/scenario-file.md
    - Generators: configuration/generators.md
    - Encoders: configuration/encoders.md
    - Sinks: configuration/sinks.md
    - Sink Batching: configuration/sink-batching.md
    - CLI Reference: configuration/cli-reference.md
  - Deployment:
    - Docker: deployment/docker.md
    - Kubernetes: deployment/kubernetes.md
    - Server API: deployment/sonda-server.md
  - Guides:
    - Tutorial: guides/tutorial.md
    - Alert Testing: guides/alert-testing.md
    - Alerting Pipeline: guides/alerting-pipeline.md
    - CI Alert Validation: guides/ci-alert-validation.md
    - Synthetic Monitoring: guides/synthetic-monitoring.md
    - Pipeline Validation: guides/pipeline-validation.md
    - Recording Rules: guides/recording-rules.md
    - Network Device Telemetry: guides/network-device-telemetry.md
    - Example Scenarios: guides/examples.md
    - E2E Testing: guides/e2e-testing.md
