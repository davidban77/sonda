site_name: Sonda
site_description: Synthetic telemetry generator for the people who run the pipeline — metrics, logs, histograms, and summaries shaped like the real thing, in a single static binary.
site_url: https://davidban77.github.io/sonda/
repo_url: https://github.com/davidban77/sonda
repo_name: davidban77/sonda

copyright: Copyright &copy; 2026 David Flores · Built with Material for MkDocs

not_in_nav: |
  /includes/
  /guides/index.md
  /configuration/index.md
  /deployment/index.md

theme:
  name: material
  language: en
  logo: assets/sonda-logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow

extra_css:
  - stylesheets/sonda.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - docs/site/docs
      auto_append:
        - includes/abbreviations.md
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - redirects:
      redirect_maps:
        # Legacy v2 scenario path
        'configuration/v2-scenarios.md': 'build/scenario-files.md'

        # Renamed/moved pages
        'getting-started.md': 'get-started/quickstart.md'
        'configuration/concepts.md': 'build/concepts.md'
        'configuration/scenario-files.md': 'build/scenario-files.md'
        'configuration/scenario-fields.md': 'reference/scenario-fields.md'
        'configuration/cli-reference.md': 'reference/cli-flags.md'
        'configuration/generators.md': 'build/generators.md'
        'configuration/encoders.md': 'build/encoders.md'
        'configuration/sinks.md': 'build/sinks.md'
        'configuration/sink-batching.md': 'build/sink-batching.md'
        'configuration/index.md': 'build/index.md'

        # Deleted tutorial pages
        'guides/tutorial.md': 'get-started/quickstart.md'
        'guides/tutorial-generators.md': 'build/generators.md'
        'guides/tutorial-encoders.md': 'build/encoders.md'
        'guides/tutorial-sinks.md': 'build/sinks.md'
        'guides/tutorial-logs.md': 'build/generators.md'
        'guides/tutorial-scheduling.md': 'build/scheduling.md'
        'guides/tutorial-multi-scenario.md': 'build/scenario-files.md'
        'guides/tutorial-server.md': 'deploy/server.md'

        # Pages that move in Pass 2 (redirect now to target location)
        'guides/alert-testing.md': 'test/alert-testing.md'
        'guides/alert-testing-thresholds.md': 'test/alert-testing.md'
        'guides/alert-testing-resolution.md': 'test/alert-testing.md'
        'guides/alert-testing-correlation.md': 'test/alert-testing.md'
        'guides/alert-testing-cardinality.md': 'test/alert-testing.md'
        'guides/alert-testing-replay.md': 'test/alert-testing.md'
        'guides/histogram-alerts.md': 'test/alert-testing.md'
        'guides/alerting-pipeline.md': 'test/end-to-end-pipelines.md'
        'guides/e2e-testing.md': 'test/end-to-end-pipelines.md'
        'guides/ci-alert-validation.md': 'test/end-to-end-pipelines.md'
        'guides/pipeline-validation.md': 'test/end-to-end-pipelines.md'
        'guides/scenarios.md': 'build/catalogs-and-packs.md'
        'guides/metric-packs.md': 'build/catalogs-and-packs.md'
        'guides/dynamic-labels.md': 'build/scheduling.md'
        'guides/recording-rules.md': 'test/recording-rules.md'
        'guides/csv-import.md': 'import/from-csv.md'
        'guides/grafana-csv-replay.md': 'import/grafana-exports.md'
        'guides/log-csv-replay.md': 'import/log-files.md'
        'guides/synthetic-monitoring.md': 'test/synthetic-monitoring.md'
        'guides/capacity-planning.md': 'test/capacity-planning.md'
        'guides/network-device-telemetry.md': 'test/network-device-telemetry.md'
        'guides/network-automation-testing.md': 'test/network-automation-testing.md'
        'guides/troubleshooting.md': 'reference/troubleshooting.md'
        'guides/examples.md': 'test/examples.md'
        'guides/index.md': 'test/index.md'

        # Deployment renames + merges
        'deployment/sonda-server.md': 'deploy/server.md'
        'deployment/events.md': 'deploy/http-api.md'
        'deployment/docker.md': 'deploy/docker.md'
        'deployment/kubernetes.md': 'deploy/kubernetes.md'
        'deployment/endpoints.md': 'deploy/server.md'
        'deployment/index.md': 'deploy/index.md'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/davidban77/sonda
      name: Sonda on GitHub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/sonda
      name: Sonda on crates.io
    - icon: fontawesome/brands/docker
      link: https://github.com/davidban77/sonda/pkgs/container/sonda
      name: Sonda container image
  generator: false

