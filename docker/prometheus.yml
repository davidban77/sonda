global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Enable the remote write receiver so sonda can push metrics via http_push sink.
# Use url: http://prometheus:9090/api/v1/write in your scenario's sink config.
remote_write: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Alertmanager
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
