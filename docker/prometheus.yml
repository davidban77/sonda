global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Remote write receiver is enabled via --web.enable-remote-write-receiver in docker-compose.yml.
# To push metrics from sonda, use http_push sink with url: http://prometheus:9090/api/v1/write

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Alertmanager
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
