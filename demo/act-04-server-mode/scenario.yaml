# Act 4 — sonda-server in a container, scenario POSTed via API.
#
# This YAML is POSTed to the running sonda-server (in the demo stack).
# The server compiles it, launches the scenario in a background thread,
# and exposes the scrapeable Prometheus endpoint at:
#   GET /scenarios/{id}/metrics
#
# Send it with:
#   curl -X POST -H "Content-Type: text/yaml" \
#     --data-binary @demo/act-04-server-mode/scenario.yaml \
#     http://localhost:8080/scenarios

version: 2

defaults:
  rate: 5
  duration: 5m
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    name: interface_oper_state
    generator:
      type: constant
      value: 1
    gaps:
      every: 30s
      for: 5s
    labels:
      hostname: r1
      interface: GigabitEthernet0/0
      job: sonda-server
