[package]
name = "sonda-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Core engine for Sonda synthetic telemetry generation"

[features]
kafka = ["dep:rskafka", "dep:tokio", "dep:chrono"]

[dependencies]
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
rand = { version = "0.8", features = ["small_rng"] }
ureq = { workspace = true }
rskafka = { version = "0.6.0", default-features = false, optional = true }
tokio = { version = "1", features = ["rt", "net", "time", "macros"], optional = true }
chrono = { version = "0.4", default-features = false, features = ["clock"], optional = true }

[dev-dependencies]
