# Memory leak: monotonically growing memory usage.
#
# Models a process with a memory leak using a sawtooth generator that
# ramps from 40% to 95% over 120 seconds before resetting. Useful for
# testing alert rules on memory growth rate or threshold breaches.

name: process_memory_usage_percent
rate: 1
duration: 120s

generator:
  type: sawtooth
  min: 40.0
  max: 95.0
  period_secs: 120

labels:
  instance: app-server-01
  job: process_exporter
  process: "leaky-service"

encoder:
  type: prometheus_text

sink:
  type: stdout
