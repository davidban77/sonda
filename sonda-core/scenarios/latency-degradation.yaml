# Latency degradation: growing response latency with jitter.
#
# Models an application experiencing gradual latency degradation using
# a sawtooth generator with jitter. Latency ramps from 50ms to 500ms
# over 60 seconds, then resets. The jitter adds realistic noise.
# Useful for testing latency SLO alerting.

name: http_request_duration_seconds
rate: 2
duration: 60s

generator:
  type: sawtooth
  min: 0.05
  max: 0.5
  period_secs: 60

jitter: 0.02
jitter_seed: 42

labels:
  instance: api-gateway-01
  job: app
  method: GET
  handler: "/api/v1/query"

encoder:
  type: prometheus_text

sink:
  type: stdout
