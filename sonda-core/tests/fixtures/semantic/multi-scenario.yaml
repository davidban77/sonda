scenarios:
  - signal_type: metrics
    name: cpu_idle
    rate: 1
    duration: 60s
    generator:
      type: constant
      value: 95.0
    encoder:
      type: prometheus_text
    sink:
      type: stdout

  - signal_type: metrics
    name: mem_usage
    rate: 2
    duration: 60s
    generator:
      type: sine
      amplitude: 20.0
      period_secs: 30
      offset: 50.0
    labels:
      hostname: web-01
    encoder:
      type: prometheus_text
    sink:
      type: stdout
    phase_offset: "5s"
    clock_group: infra

  - signal_type: metrics
    name: disk_io
    rate: 1
    duration: 60s
    generator:
      type: sawtooth
      min: 0.0
      max: 100.0
      period_secs: 120
    encoder:
      type: influx_lp
    sink:
      type: stdout
