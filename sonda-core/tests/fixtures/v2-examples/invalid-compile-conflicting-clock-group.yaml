version: 2

defaults:
  rate: 1

scenarios:
  - id: alpha
    signal_type: metrics
    name: a
    clock_group: group_alpha
    generator:
      type: flap
      up_duration: 60s
      down_duration: 30s

  - id: bravo
    signal_type: metrics
    name: b
    clock_group: group_bravo
    generator:
      type: constant
      value: 1
    after:
      ref: alpha
      op: "<"
      value: 1
