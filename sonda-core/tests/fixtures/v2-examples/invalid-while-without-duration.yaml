version: 2
kind: runnable

defaults:
  rate: 1

scenarios:
  - id: src
    signal_type: metrics
    name: src
    generator:
      type: constant
      value: 1

  - id: gated
    signal_type: metrics
    name: gated
    generator:
      type: constant
      value: 1
    while:
      ref: src
      op: ">"
      value: 0
