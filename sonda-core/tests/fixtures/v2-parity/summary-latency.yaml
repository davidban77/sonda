version: 2

scenarios:
  - signal_type: summary
    name: rpc_duration_seconds
    rate: 1
    duration: 1s
    distribution:
      type: normal
      mean: 0.1
      stddev: 0.02
    quantiles: [0.5, 0.9, 0.95, 0.99]
    observations_per_tick: 100
    mean_shift_per_sec: 0.001
    seed: 42
    labels:
      service: rpc
    encoder:
      type: prometheus_text
    sink:
      type: stdout
