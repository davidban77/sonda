version: 2

scenarios:
  - signal_type: metrics
    name: http_request_duration_seconds
    rate: 2
    duration: 1s
    generator:
      type: degradation
      baseline: 0.05
      ceiling: 0.5
      time_to_degrade: "60s"
      noise: 0.02
      noise_seed: 42
    labels:
      instance: api-gateway-01
      job: app
      method: GET
      handler: "/api/v1/query"
    encoder:
      type: prometheus_text
    sink:
      type: stdout
