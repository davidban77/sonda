version: 2

scenarios:
  - signal_type: metrics
    name: tcp_metric
    rate: 1
    duration: 1s
    generator:
      type: constant
      value: 1.0
    encoder:
      type: prometheus_text
    sink:
      type: tcp
      address: "127.0.0.1:9999"
      retry:
        max_attempts: 5
        initial_backoff: "100ms"
        max_backoff: "5s"
