# Hand-written translator probe (no v1 built-in mirrors it); closes matrix
# row 7.1 — `gaps` window settings (every/for) must round-trip unchanged
# through the v2 translator.
version: 2
kind: runnable

scenarios:
  - signal_type: metrics
    name: gap_metric
    rate: 10
    duration: 2m
    generator:
      type: constant
      value: 1.0
    gaps:
      every: 30s
      for: 5s
    encoder:
      type: prometheus_text
    sink:
      type: stdout
