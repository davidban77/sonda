version: 2

scenarios:
  - signal_type: metrics
    name: gap_and_burst_metric
    rate: 5
    duration: 2m
    generator:
      type: constant
      value: 1.0
    gaps:
      every: 30s
      for: 5s
    bursts:
      every: 15s
      for: 3s
      multiplier: 4.0
    encoder:
      type: prometheus_text
    sink:
      type: stdout
