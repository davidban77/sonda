# Hand-written translator probe (no v1 built-in mirrors it); closes matrix
# row 5.2 — the `influx_lp` encoder's custom `field_key:` must round-trip
# unchanged through the v2 translator.
version: 2
kind: runnable

scenarios:
  - signal_type: metrics
    name: cpu_load
    rate: 1
    duration: 1s
    generator:
      type: constant
      value: 1.0
    encoder:
      type: influx_lp
      field_key: v
    sink:
      type: stdout
