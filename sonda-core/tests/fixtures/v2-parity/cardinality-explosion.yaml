version: 2

scenarios:
  - signal_type: metrics
    name: container_cpu_usage_seconds_total
    rate: 5
    duration: 500ms
    generator:
      type: sine
      amplitude: 0.3
      period_secs: 60
      offset: 0.5
    labels:
      namespace: production
      container: worker
      job: kubelet
    cardinality_spikes:
      - label: pod_name
        every: 60s
        for: 20s
        cardinality: 500
        strategy: counter
        prefix: "worker-"
    encoder:
      type: prometheus_text
    sink:
      type: stdout
