version: 2

scenarios:
  - signal_type: metrics
    name: node_cpu_usage_idle_percent
    rate: 1
    duration: 1s
    generator:
      type: steady
      center: 75.0
      amplitude: 10.0
      period: "60s"
      noise: 2.0
      noise_seed: 7
    labels:
      instance: web-01
      job: node_exporter
      cpu: "0"
      mode: idle
    encoder:
      type: prometheus_text
    sink:
      type: stdout
