version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: sonda-e2e-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: sonda-e2e-victoriametrics
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=1"
    ports:
      - "8428:8428"
    volumes:
      - vm-storage:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: sonda-e2e-vmagent
    command:
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/import/prometheus"
      - "--httpListenAddr=:8429"
    ports:
      - "8429:8429"
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8429/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  vm-storage:
