# Scenario: sonda -> VictoriaMetrics via Prometheus text format
#
# VictoriaMetrics accepts Prometheus text exposition format via POST to
# /api/v1/import/prometheus with Content-Type: text/plain.
#
# Run this scenario after starting the e2e stack:
#   docker compose -f tests/e2e/docker-compose.yml up -d
#   sonda metrics --scenario tests/e2e/scenarios/vm-prometheus-text.yaml
#
# Verify data arrived:
#   curl "http://localhost:8428/api/v1/query?query=sonda_e2e_vm_prom_text"
name: sonda_e2e_vm_prom_text
rate: 50
duration: 5s

generator:
  type: sine
  amplitude: 10.0
  period_secs: 10
  offset: 50.0

labels:
  scenario: vm-prometheus-text
  encoder: prometheus_text
  sink: http_push

encoder:
  type: prometheus_text

sink:
  type: http_push
  url: "http://localhost:8428/api/v1/import/prometheus"
  content_type: "text/plain"
  batch_size: 65536
