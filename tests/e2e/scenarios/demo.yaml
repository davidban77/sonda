version: 2
kind: runnable

defaults:
  rate: 100
  duration: 5m
  encoder:
    type: prometheus_text
  sink:
    type: http_push
    url: "http://localhost:8428/api/v1/import/prometheus"
    content_type: "text/plain"
    batch_size: 4096
  labels:
    host: demo
    env: dev

scenarios:
  - id: demo_sine_wave
    signal_type: metrics
    name: demo_sine_wave
    generator:
      type: sine
      amplitude: 50.0
      period_secs: 10
      offset: 50.0
