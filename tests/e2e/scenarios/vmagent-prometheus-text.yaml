# Scenario: sonda -> vmagent -> VictoriaMetrics via Prometheus text format
#
# vmagent accepts Prometheus text exposition format via POST to
# /api/v1/import/prometheus and relays it to VictoriaMetrics. This tests
# the full push pipeline through an agent layer.
#
# Run this scenario after starting the e2e stack:
#   docker compose -f tests/e2e/docker-compose.yml up -d
#   sonda run tests/e2e/scenarios/vmagent-prometheus-text.yaml
#
# Verify data arrived in VictoriaMetrics (vmagent forwards to VM):
#   curl "http://localhost:8428/api/v1/query?query=sonda_e2e_vmagent_prom_text"
version: 2
kind: runnable

defaults:
  rate: 50
  duration: 5s
  encoder:
    type: prometheus_text
  sink:
    type: http_push
    url: "http://localhost:8429/api/v1/import/prometheus"
    content_type: "text/plain"
    batch_size: 4096
  labels:
    scenario: vmagent-prometheus-text
    encoder: prometheus_text
    sink: http_push
    via: vmagent

scenarios:
  - id: sonda_e2e_vmagent_prom_text
    signal_type: metrics
    name: sonda_e2e_vmagent_prom_text
    generator:
      type: constant
      value: 1.0
