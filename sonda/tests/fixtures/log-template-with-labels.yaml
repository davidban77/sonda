version: 2

defaults:
  rate: 10
  duration: 5s
  encoder:
    type: json_lines
  sink:
    type: stdout
  labels:
    device: wlan0
    hostname: router-01

scenarios:
  - id: test_log_template_labels
    signal_type: logs
    name: test_log_template_labels
    log_generator:
      type: template
      templates:
        - message: "Request from {ip} completed"
          field_pools:
            ip:
              - "10.0.0.1"
              - "10.0.0.2"
      severity_weights:
        info: 0.8
        error: 0.2
      seed: 99
