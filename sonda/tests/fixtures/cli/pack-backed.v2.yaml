# v2 pack-backed scenario. Exercises the spec §5 `[override]` tag path:
# the `tiny_pack` metric `pack_metric_a` gets its generator overridden
# inline, so dry-run output should tag that metric's generator line.
version: 2
kind: runnable

defaults:
  rate: 1
  duration: 300ms
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - id: primary
    signal_type: metrics
    pack: tiny_pack
    overrides:
      pack_metric_a:
        generator:
          type: constant
          value: 99.0
