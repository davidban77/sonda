version: 2
kind: runnable
scenario_name: scn-a
category: network
description: "Catalog test scenario A"

defaults:
  rate: 1
  duration: 300ms
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - id: scn_a_metric
    signal_type: metrics
    name: scn_a_metric
    generator:
      type: constant
      value: 1.0
