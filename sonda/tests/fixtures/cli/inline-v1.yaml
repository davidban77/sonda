# v1 single-scenario file (no `version:` field). Used by CLI tests that
# verify `sonda run --scenario` accepts legacy files unchanged.
scenarios:
  - signal_type: metrics
    name: v1_inline_metric
    rate: 5
    duration: 300ms
    generator:
      type: constant
      value: 1.0
    encoder:
      type: prometheus_text
    sink:
      type: stdout
