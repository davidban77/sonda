version: 2
kind: runnable

defaults:
  rate: 10
  duration: 5s
  encoder:
    type: json_lines
  sink:
    type: stdout

scenarios:
  - id: test_log_template
    signal_type: logs
    name: test_log_template
    log_generator:
      type: template
      templates:
        - message: "Request from {ip} completed"
          field_pools:
            ip:
              - "10.0.0.1"
              - "10.0.0.2"
              - "10.0.0.3"
      severity_weights:
        info: 0.8
        error: 0.2
      seed: 99
