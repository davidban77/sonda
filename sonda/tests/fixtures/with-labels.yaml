version: 2

defaults:
  rate: 100
  duration: 5s
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - id: interface_oper_state
    signal_type: metrics
    name: interface_oper_state
    generator:
      type: sine
      amplitude: 5.0
      period_secs: 30
      offset: 10.0
    gaps:
      every: 2m
      for: 20s
    labels:
      hostname: t0-a1
      zone: eu1
