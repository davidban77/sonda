# Link failover: edge router primary link failure with traffic shift to backup.
#
# Models an edge router experiencing a primary link failure. The v2 compiler
# resolves the `after:` clauses into concrete per-entry phase offsets, so
# signals emit in causal order:
#
#   1. Primary interface flaps: up for 60s, down for 30s, cycling
#      (interface_oper_state via the `flap` alias).
#   2. Backup link saturates after the primary drops below 1
#      (backup_link_utilization via the `saturation` alias).
#   3. Latency degrades after backup utilization exceeds 70%
#      (latency_ms via the `degradation` alias).
#
# Run with:
#   sonda catalog run link-failover
#   sonda run --scenario scenarios/link-failover.yaml
#   sonda run --scenario scenarios/link-failover.yaml --dry-run
#   sonda run --scenario scenarios/link-failover.yaml --duration 2m
#
# Each entry's `duration:` runs from its own resolved start (`phase_offset`),
# so a cascade's total wall-clock can exceed `defaults.duration`. With the
# values below the chain finishes around `152s + 5m ≈ 7m32s`; `--duration 2m`
# shortens every phase individually (so the cascade ends near `152s + 2m`),
# it does not cap the total wall-clock.

version: 2

scenario_name: link-failover
category: network
description: "Edge router link failure with traffic shift to backup"

defaults:
  rate: 1
  duration: 5m
  encoder:
    type: prometheus_text
  sink:
    type: stdout
  labels:
    device: rtr-edge-01
    job: network

scenarios:
  # Primary interface flaps: up for 60s, down for 30s, cycling.
  - id: interface_oper_state
    signal_type: metrics
    name: interface_oper_state
    generator:
      type: flap
      up_duration: 60s
      down_duration: 30s
    labels:
      interface: GigabitEthernet0/0/0

  # Backup link saturates after the primary drops below 1.
  # Ramps from 20% to 85% utilization over 2 minutes.
  - id: backup_link_utilization
    signal_type: metrics
    name: backup_link_utilization
    generator:
      type: saturation
      baseline: 20
      ceiling: 85
      time_to_saturate: 2m
    labels:
      interface: GigabitEthernet0/1/0
    after:
      ref: interface_oper_state
      op: "<"
      value: 1

  # Latency degrades after backup utilization exceeds 70%.
  # Climbs from 5ms to 150ms over 3 minutes.
  - id: latency_ms
    signal_type: metrics
    name: latency_ms
    generator:
      type: degradation
      baseline: 5
      ceiling: 150
      time_to_degrade: 3m
    labels:
      path: backup
    after:
      ref: backup_link_utilization
      op: ">"
      value: 70
