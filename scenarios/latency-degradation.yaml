# Latency degradation: growing response latency with jitter.
#
# Models an application experiencing gradual latency degradation using
# the `degradation` alias (sawtooth + noise). Latency ramps from 50ms
# to 500ms over 60 seconds. The noise adds realistic variation.
# Useful for testing latency SLO alerting.

scenario_name: latency-degradation
category: application
signal_type: metrics
description: "Growing response latency with jitter (sawtooth)"

name: http_request_duration_seconds
rate: 2
duration: 60s

generator:
  type: degradation
  baseline: 0.05
  ceiling: 0.5
  time_to_degrade: "60s"
  noise: 0.02
  noise_seed: 42

labels:
  instance: api-gateway-01
  job: app
  method: GET
  handler: "/api/v1/query"

encoder:
  type: prometheus_text

sink:
  type: stdout
