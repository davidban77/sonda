# Steady state: normal oscillating baseline metrics.
#
# Models a healthy server with normal CPU and memory oscillation using
# the `steady` alias (sine + jitter). Represents the "everything is fine"
# baseline. Useful as a control signal when testing alert rules -- this
# scenario should NOT trigger any alerts.

scenario_name: steady-state
category: infrastructure
signal_type: metrics
description: "Normal oscillating baseline (sine + jitter)"

name: node_cpu_usage_idle_percent
rate: 1
duration: 60s

generator:
  type: steady
  center: 75.0
  amplitude: 10.0
  period: "60s"
  noise: 2.0
  noise_seed: 7

labels:
  instance: web-01
  job: node_exporter
  cpu: "0"
  mode: idle

encoder:
  type: prometheus_text

sink:
  type: stdout
