# Error rate spike: periodic HTTP error bursts.
#
# Models an application experiencing recurring error rate spikes. The
# spike generator produces a baseline of ~2 errors/sec with periodic
# bursts to ~50 errors/sec. Useful for testing error rate alerting
# and anomaly detection.

scenario_name: error-rate-spike
category: application
signal_type: metrics
description: "Periodic HTTP error rate bursts"

name: http_requests_errors_total
rate: 2
duration: 60s

generator:
  type: spike
  baseline: 2.0
  magnitude: 48.0
  duration_secs: 5
  interval_secs: 20

labels:
  instance: api-server-01
  job: app
  status: "500"
  method: POST
  handler: "/api/v1/ingest"

encoder:
  type: prometheus_text

sink:
  type: stdout
