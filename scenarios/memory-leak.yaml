# Memory leak: monotonically growing memory usage.
#
# Models a process with a memory leak using the `leak` alias -- a
# one-way ramp from 40% to 95% over 120 seconds. Useful for testing
# alert rules on memory growth rate or threshold breaches.

version: 2

scenario_name: memory-leak
category: infrastructure
description: "Monotonically growing memory usage (sawtooth)"

scenarios:
  - signal_type: metrics
    name: process_memory_usage_percent
    rate: 1
    duration: 120s
    generator:
      type: leak
      baseline: 40.0
      ceiling: 95.0
      time_to_ceiling: "120s"
    labels:
      instance: app-server-01
      job: process_exporter
      process: "leaky-service"
    encoder:
      type: prometheus_text
    sink:
      type: stdout
