version: 2
kind: runnable

defaults:
  rate: 100
  duration: 10s
  encoder:
    type: influx_lp
  sink:
    type: file
    path: /tmp/sonda-output.txt

scenarios:
  - signal_type: metrics
    name: http_requests_total
    generator:
      type: sawtooth
      min: 0.0
      max: 1000.0
      period_secs: 10
    labels:
      method: GET
      endpoint: /api/v1/health
