# Long-running scenario — no duration, runs until stopped.
# Use with sonda-server: POST to start, DELETE to stop.
version: 2

defaults:
  rate: 10
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    name: continuous_cpu
    generator:
      type: sine
      amplitude: 50.0
      period_secs: 60
      offset: 50.0
    labels:
      instance: api-server-01
      job: sonda
