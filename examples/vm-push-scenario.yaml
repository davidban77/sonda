# Push a sine-wave cpu_usage metric to VictoriaMetrics via HTTP import.
#
# Prerequisites:
#   docker compose -f examples/docker-compose-victoriametrics.yml up -d
#
# Usage:
#   sonda run examples/vm-push-scenario.yaml
#
# Verify data arrived:
#   curl "http://localhost:8428/api/v1/query?query=cpu_usage"

version: 2
kind: runnable

defaults:
  rate: 1
  duration: 120s
  encoder:
    type: prometheus_text
  sink:
    type: http_push
    url: "${VICTORIAMETRICS_URL:-http://localhost:8428/api/v1/import/prometheus}"
    content_type: "text/plain"

scenarios:
  - signal_type: metrics
    name: cpu_usage
    generator:
      type: sine
      amplitude: 50.0
      period_secs: 60
      offset: 50.0
    labels:
      instance: server-01
      job: node
