version: 2

defaults:
  rate: 10
  duration: 5s
  encoder:
    type: prometheus_text
  sink:
    type: tcp
    address: "127.0.0.1:9999"

scenarios:
  - signal_type: metrics
    name: cpu_usage
    generator:
      type: sine
      amplitude: 50.0
      period_secs: 10
      offset: 50.0
    labels:
      host: server-01
      region: us-east
