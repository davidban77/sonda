# Dynamic Labels: Log Scenario
#
# Demonstrates dynamic labels with log scenarios. The "pod_name" label
# rotates through api-0, api-1, api-2 on every emitted log event.
#
# Usage:
#   sonda run examples/dynamic-labels-logs.yaml

version: 2
kind: runnable

defaults:
  rate: 5
  duration: 10s
  encoder:
    type: json_lines
  sink:
    type: stdout

scenarios:
  - signal_type: logs
    name: app_logs
    log_generator:
      type: template
      templates:
        - message: "Request handled successfully"
      severity_weights:
        info: 1.0
      seed: 42
    dynamic_labels:
      - key: pod_name
        prefix: "api-"
        cardinality: 3
    labels:
      app: sonda
