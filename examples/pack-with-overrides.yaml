# Example: pack with per-metric generator overrides.
#
# The overrides map lets you replace the default generator for specific
# metrics without modifying the pack definition. Here ifOperStatus uses
# a flap alias to simulate interface up/down toggling.
#
# The pack must be findable on the search path. Run from the repo root
# (where `./packs/` exists), or set SONDA_PACK_PATH to point to the
# packs directory, or use `--pack-path ./packs`.

version: 2

defaults:
  rate: 1
  duration: 30s
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    pack: telegraf_snmp_interface
    labels:
      device: rtr-edge-01
      ifName: GigabitEthernet0/0/0
      ifAlias: "Uplink to Core"
      ifIndex: "1"
    overrides:
      ifOperStatus:
        generator:
          type: flap
