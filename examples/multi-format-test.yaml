# Multi-format pipeline test: verify InfluxDB line protocol output.
#
# Pushes a constant value through the influx_lp encoder to a file sink.
# Use this to validate that your pipeline parses InfluxDB line protocol
# correctly.
#
# Usage:
#   sonda run examples/multi-format-test.yaml
#   wc -l < /tmp/pipeline-influx.txt

version: 2
kind: runnable

defaults:
  rate: 2
  duration: 10s
  encoder:
    type: influx_lp
  sink:
    type: file
    path: /tmp/pipeline-influx.txt

scenarios:
  - signal_type: metrics
    name: pipeline_test
    generator:
      type: constant
      value: 42.0
    labels:
      env: test
