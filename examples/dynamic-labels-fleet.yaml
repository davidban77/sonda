# Dynamic Labels: Fleet Simulation
#
# Simulates a 10-node fleet by rotating the "hostname" label through
# host-0 .. host-9 on every tick. Every emitted metric carries a hostname
# label — unlike cardinality spikes, the label is always present.
#
# Use this to test dashboards and alerts that aggregate by hostname,
# or to exercise high-cardinality query paths in Prometheus / VictoriaMetrics.
#
# Usage:
#   sonda metrics --scenario examples/dynamic-labels-fleet.yaml

version: 2
kind: runnable

defaults:
  rate: 10
  duration: 10s
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    name: node_cpu_usage
    generator:
      type: sine
      amplitude: 40.0
      period_secs: 60
      offset: 50.0
    dynamic_labels:
      - key: hostname
        prefix: "host-"
        cardinality: 10
    labels:
      env: production
      cluster: us-east-1
