# VictoriaMetrics + Sonda compose stack
#
# A self-contained setup for evaluating Sonda with VictoriaMetrics as the
# metrics backend and Grafana for visualization.
#
# Quick start:
#
#   docker compose -f examples/docker-compose-victoriametrics.yml up -d
#
# Then push a scenario via the sonda-server API:
#
#   curl -X POST -H "Content-Type: text/yaml" \
#     --data-binary @examples/victoriametrics-metrics.yaml \
#     http://localhost:8080/scenarios
#
# Verify data arrived in VictoriaMetrics:
#
#   curl "http://localhost:8428/api/v1/series?match[]={__name__=~'sonda.*'}"
#
# Open Grafana at http://localhost:3000 (anonymous access, no login required)
# to explore metrics with the pre-configured VictoriaMetrics datasource.
# The "Sonda Overview" dashboard is auto-provisioned under Dashboards > Sonda.
#
# Optional services are available via Docker Compose profiles:
#
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile alerting up -d
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile loki up -d
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile kafka up -d
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile loki --profile kafka up -d
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile prometheus up -d
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile otel-collector up -d
#   docker compose -f examples/docker-compose-victoriametrics.yml --profile otel-collector --profile loki up -d
#
# Tear down:
#
#   docker compose -f examples/docker-compose-victoriametrics.yml down -v

services:
  # ---------------------------------------------------------------------------
  # sonda-server: the Sonda HTTP control plane.
  #
  # Accepts scenario YAML via POST /scenarios and runs them in background
  # threads. Scenario files in ./examples are mounted at /scenarios inside
  # the container for reference, but scenarios are submitted via the API.
  # ---------------------------------------------------------------------------
  sonda-server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./:/scenarios:ro
    # Environment variables consumed by ${VAR:-default} interpolation in
    # the example scenario YAMLs. When a scenario is POSTed to this server
    # the substitution resolves to the in-network service name; running the
    # same YAML from the host CLI falls back to the localhost defaults
    # baked into the YAML.
    environment:
      VICTORIAMETRICS_URL: "http://victoriametrics:8428/api/v1/import/prometheus"
      VICTORIAMETRICS_REMOTE_WRITE_URL: "http://victoriametrics:8428/api/v1/write"
      VMAGENT_URL: "http://vmagent:8429/api/v1/write"
      PROMETHEUS_URL: "http://prometheus:9090/api/v1/write"
      LOKI_URL: "http://loki:3100"
      KAFKA_BROKERS: "kafka:9092"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/sonda", "metrics", "--name", "healthcheck", "--rate", "1", "--duration", "1ms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # VictoriaMetrics: single-node time series database.
  #
  # Accepts Prometheus text exposition format via HTTP import:
  #   POST http://victoriametrics:8428/api/v1/import/prometheus
  #
  # Also accepts InfluxDB line protocol:
  #   POST http://victoriametrics:8428/write
  #
  # Query via the standard Prometheus API:
  #   GET http://localhost:8428/api/v1/query?query=<expr>
  #
  # Built-in UI (vmui) available at:
  #   http://localhost:8428/vmui
  #
  # Data is persisted in the vm-data volume so metrics survive container
  # restarts. Retention is set to 7 days.
  # ---------------------------------------------------------------------------
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.140.0
    ports:
      - "8428:8428"
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=7d"
    volumes:
      - vm-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # vmagent: metrics relay agent from VictoriaMetrics.
  #
  # vmagent can scrape Prometheus targets and forward metrics to a remote
  # backend. Here it is configured to relay incoming data to VictoriaMetrics.
  #
  # vmagent's remote write relay uses the Prometheus remote write protocol
  # (protobuf + snappy). Sonda supports this via the `remote_write`
  # encoder + sink pair (requires the `remote-write` feature flag):
  #
  #   cargo build --features remote-write -p sonda
  #   sonda metrics --scenario examples/remote-write-vm.yaml
  #
  # The remote_write sink automatically batches TimeSeries into a single
  # WriteRequest, snappy-compresses, and POSTs with the correct headers.
  # Compatible with vmagent, Prometheus, Thanos Receive, Cortex, Mimir,
  # and Grafana Cloud.
  #
  # Alternatively, push metrics directly to VictoriaMetrics using the
  # http_push sink with Prometheus text format, which bypasses vmagent.
  # ---------------------------------------------------------------------------
  vmagent:
    image: victoriametrics/vmagent:v1.140.0
    ports:
      - "8429:8429"
    command:
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "--httpListenAddr=:8429"
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8429/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Grafana: dashboards and metric exploration.
  #
  # Anonymous access is enabled so you can open http://localhost:3000 without
  # logging in. The VictoriaMetrics datasource is pre-provisioned -- go to
  # Explore, select "VictoriaMetrics", and run PromQL queries.
  #
  # The "Sonda Overview" dashboard is auto-provisioned under Dashboards > Sonda.
  # It shows generated metric values, event rate, active scenario count, and
  # gap/burst indicators. The dashboard uses template variables ($datasource
  # and $job) so it works with any Prometheus-compatible datasource.
  #
  # Admin credentials (if needed): admin / admin
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:13.0.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../docker/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Loki: log aggregation system.
  #
  # Accepts log entries via the push API:
  #   POST http://loki:3100/loki/api/v1/push
  #
  # Query logs via the Loki API:
  #   GET http://localhost:3100/loki/api/v1/query?query={job="sonda"}
  #
  # This service is only started with --profile loki.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.5
    profiles: [loki]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Kafka: official Apache Kafka image in KRaft mode (no ZooKeeper).
  #
  # Internal listener on port 9092 (for inter-container communication).
  # External listener on port 9094 (for host access).
  # Auto-creation of topics is enabled.
  #
  # This service is only started with --profile kafka.
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:4.2.0
    profiles: [kafka]
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kafka UI: web interface for inspecting Kafka topics and messages.
  #
  # Available at http://localhost:8081 (port 8081 to avoid collision with
  # sonda-server on port 8080).
  #
  # This service is only started with --profile kafka.
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: [kafka]
    environment:
      - KAFKA_CLUSTERS_0_NAME=sonda
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "8081:8080"
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # vmalert: VictoriaMetrics alerting engine.
  #
  # Evaluates recording and alerting rules against VictoriaMetrics, then
  # sends firing alerts to Alertmanager. Compatible with Prometheus alerting
  # rule syntax.
  #
  # Alert rules are mounted from examples/alertmanager/alert-rules.yml.
  # vmalert UI available at http://localhost:8880 to inspect rule state and
  # active alerts.
  #
  # This service is only started with --profile alerting.
  # ---------------------------------------------------------------------------
  vmalert:
    image: victoriametrics/vmalert:v1.140.0
    profiles: [alerting]
    ports:
      - "8880:8880"
    command:
      - "--datasource.url=http://victoriametrics:8428"
      - "--remoteRead.url=http://victoriametrics:8428"
      - "--remoteWrite.url=http://victoriametrics:8428"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/rules/*.yml"
      - "--httpListenAddr=:8880"
      - "--evaluationInterval=5s"
    volumes:
      - ./alertmanager/alert-rules.yml:/rules/alert-rules.yml:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8880/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Alertmanager: Prometheus alert notification router.
  #
  # Receives alerts from vmalert and routes them to configured receivers.
  # In this stack, all alerts are sent to the webhook-receiver service so
  # you can inspect the full notification payload.
  #
  # Alertmanager UI available at http://localhost:9093.
  #
  # This service is only started with --profile alerting.
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: [alerting]
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9093/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # webhook-receiver: lightweight HTTP echo server that logs request bodies.
  #
  # Receives alert notifications from Alertmanager and prints the full JSON
  # payload to stdout, so you can verify end-to-end alert delivery with:
  #
  #   docker compose -f examples/docker-compose-victoriametrics.yml \
  #     --profile alerting logs -f webhook-receiver
  #
  # Uses mendhak/http-https-echo, a well-maintained (~24M pulls) echo server
  # that returns the request body and headers as JSON.
  #
  # This service is only started with --profile alerting.
  # ---------------------------------------------------------------------------
  webhook-receiver:
    image: mendhak/http-https-echo:35
    profiles: [alerting]
    ports:
      - "8090:8080"
    environment:
      - HTTP_PORT=8080
      - LOG_WITHOUT_NEWLINE=true

  # ---------------------------------------------------------------------------
  # prometheus: upstream Prometheus with the remote-write receiver enabled.
  #
  # Started with --web.enable-remote-write-receiver so Sonda's remote_write
  # sink can POST to http://localhost:9090/api/v1/write. Use this profile when
  # you specifically need to verify against real Prometheus instead of (or
  # alongside) VictoriaMetrics.
  #
  # Query at http://localhost:9090/api/v1/query.
  #
  # This service is only started with --profile prometheus.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.11.2
    profiles: [prometheus]
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.listen-address=:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # otel-collector: OpenTelemetry Collector (contrib distribution).
  #
  # Receives OTLP/gRPC on :4317 and OTLP/HTTP on :4318. Forwards metrics to
  # VictoriaMetrics via the Prometheus remote-write exporter, so the standard
  # VM query path (http://localhost:8428/api/v1/query) verifies arrival.
  #
  # Logs go to Loki via the loki exporter when the loki profile is also up;
  # the debug exporter mirrors them to collector stdout for inspection with:
  #
  #   docker compose -f examples/docker-compose-victoriametrics.yml \
  #     --profile otel-collector logs -f otel-collector
  #
  # This service is only started with --profile otel-collector.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    profiles: [otel-collector]
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:13133/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  vm-data:
