# CSV Replay Generator Example
#
# Replays real CPU usage values from a recorded CSV file. The sample data
# models a production incident: normal baseline (~14%), spike to ~95%,
# sustained high load, then recovery back to baseline.
#
# The CSV has 10-second sample intervals across 50 rows (≈500s total).
# csv_replay derives its emission rate from the CSV timestamps, so the
# scenario-level `rate:` becomes informational; `duration: 500s` covers
# the full source span at the derived 0.1/s rate.
#
# Run with:
#   sonda run examples/csv-replay-metrics.yaml

version: 2
kind: runnable

defaults:
  rate: 1
  duration: 500s
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    name: cpu_replay
    generator:
      type: csv_replay
      file: examples/sample-cpu-values.csv
      columns:
        - index: 1
          name: cpu_replay
    labels:
      instance: prod-server-42
      job: node
