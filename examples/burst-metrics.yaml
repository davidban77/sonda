version: 2
kind: runnable

defaults:
  rate: 100
  duration: 60s
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    name: cpu_burst
    generator:
      type: sine
      amplitude: 20.0
      period_secs: 60
      offset: 50.0
    bursts:
      every: 10s
      for: 2s
      multiplier: 5.0
    labels:
      host: web-01
      zone: us-east-1
