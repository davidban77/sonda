# Dynamic Labels: Multiple Rotating Labels
#
# Combines two dynamic labels (hostname and region) with static labels.
# Each label cycles independently, producing hostname x region combinations.
#
# Usage:
#   sonda metrics --scenario examples/dynamic-labels-multi.yaml

name: request_count
rate: 10
duration: 10s

generator:
  type: step
  start: 0
  step_size: 1.0
  max: 10000

dynamic_labels:
  - key: hostname
    prefix: "web-"
    cardinality: 3
  - key: region
    values: [us-east-1, eu-west-1]

labels:
  service: frontend

encoder:
  type: prometheus_text
sink:
  type: stdout
