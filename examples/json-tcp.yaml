# JSON Lines encoder → TCP sink
#
# Streams structured JSON events over a persistent TCP connection.
# Start a listener before running:
#
#   nc -l 9999 &
#   sonda run examples/json-tcp.yaml
#
# Each line is a self-contained JSON object, compatible with Elasticsearch,
# Loki, and any other NDJSON-based ingest path.

version: 2
kind: runnable

defaults:
  rate: 20
  duration: 10s
  encoder:
    type: json_lines
  sink:
    type: tcp
    address: "127.0.0.1:9999"

scenarios:
  - signal_type: metrics
    name: http_request_duration_ms
    generator:
      type: sine
      amplitude: 50.0
      period_secs: 20
      offset: 150.0
    labels:
      method: GET
      status: 200
      service: api-gateway
