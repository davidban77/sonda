# Influx Line Protocol encoder → file sink
#
# Writes a sawtooth ramp in InfluxDB line protocol format to a local file.
# Parent directories are created automatically if they do not exist.
#
# Run:
#   sonda metrics --scenario examples/influx-file.yaml
#   cat /tmp/sonda-influx-output.txt
name: disk_io_bytes
rate: 50
duration: 10s

generator:
  type: sawtooth
  min: 0.0
  max: 10000000.0
  period_secs: 10

labels:
  device: sda
  host: storage-01

encoder:
  type: influx_lp
  field_key: bytes

sink:
  type: file
  path: /tmp/sonda-influx-output.txt
