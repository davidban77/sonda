# kafka-sink.yaml
#
# Publishes a constant metric to a local Kafka broker at 100 events/sec for
# 30 seconds. Encoded bytes are buffered internally and flushed as a single
# Kafka record when the buffer reaches 64 KiB or when the scenario ends.
#
# Prerequisites:
#   A Kafka broker must be reachable at localhost:9094.
#   The topic "sonda-metrics" is auto-created by the broker if
#   auto.create.topics.enable=true (the default for most Kafka distributions).
#
# Usage:
#   sonda run examples/kafka-sink.yaml

version: 2
kind: runnable

defaults:
  rate: 100.0
  duration: 30s
  encoder:
    type: prometheus_text
  sink:
    type: kafka
    brokers: "${KAFKA_BROKERS:-localhost:9094}"
    topic: sonda-metrics

scenarios:
  - signal_type: metrics
    name: kafka_constant
    generator:
      type: constant
      value: 1.0
    labels:
      hostname: localhost
      env: dev
