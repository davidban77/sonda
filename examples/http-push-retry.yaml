# Push metrics to VictoriaMetrics with retry on transient failures.
#
# The retry block configures exponential backoff with full jitter.
# On a transient error (HTTP 5xx, 429, or connection failure), Sonda
# retries up to max_attempts times before discarding the batch.
#
# Usage:
#   sonda run examples/http-push-retry.yaml
#
# Retry settings live in the YAML `retry:` block below — they have no CLI override.

version: 2
kind: runnable

defaults:
  rate: 10
  duration: 60s
  encoder:
    type: prometheus_text
  sink:
    type: http_push
    url: "${VICTORIAMETRICS_URL:-http://localhost:8428/api/v1/import/prometheus}"
    content_type: "text/plain"
    batch_size: 32768
    retry:
      max_attempts: 3
      initial_backoff: 100ms
      max_backoff: 5s

scenarios:
  - signal_type: metrics
    name: cpu_usage
    generator:
      type: sine
      amplitude: 50.0
      period_secs: 60
      offset: 50.0
    labels:
      host: server-01
      region: us-east
