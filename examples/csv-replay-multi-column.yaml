# Multi-column CSV Replay Example
#
# Replays multiple metrics from a single CSV file. Each column becomes an
# independent metric scenario -- same rate, duration, labels, encoder, and
# sink -- with its own metric name and column index.
#
# This is equivalent to writing three separate csv_replay scenarios, but
# avoids duplicating the shared configuration.
#
# Run with:
#   sonda run examples/csv-replay-multi-column.yaml

version: 2
kind: runnable

defaults:
  rate: 1
  duration: 60s
  encoder:
    type: prometheus_text
  sink:
    type: stdout

scenarios:
  - signal_type: metrics
    name: system_metrics
    generator:
      type: csv_replay
      file: examples/sample-multi-column.csv
      columns:
        - index: 1
          name: cpu_percent
        - index: 2
          name: mem_percent
        - index: 3
          name: disk_io_mbps
    labels:
      instance: prod-server-42
      job: node
