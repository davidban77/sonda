# Push logs to an OpenTelemetry Collector via OTLP/gRPC.
#
# Prerequisites:
#   - An OTEL Collector running on localhost:4317 (default gRPC port).
#
# Usage:
#   cargo run --features otlp -- logs --scenario examples/otlp-logs.yaml
#
# The encoder serializes each log event as an OTLP LogRecord in protobuf
# format. The sink batches log records and sends them as
# ExportLogsServiceRequest via gRPC.

version: 2
kind: runnable

defaults:
  rate: 5
  duration: 30s
  encoder:
    type: otlp
  sink:
    type: otlp_grpc
    endpoint: "${OTLP_GRPC_ENDPOINT:-http://localhost:4317}"
    signal_type: logs
    batch_size: 50

scenarios:
  - signal_type: logs
    name: app_logs
    log_generator:
      type: template
      templates:
        - message: "Request processed in {latency}ms"
          field_pools:
            latency: ["10", "50", "100", "500"]
    labels:
      host: server-01
      service: web
