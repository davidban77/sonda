version: 2
kind: runnable

defaults:
  rate: 10
  duration: 60s
  encoder:
    type: json_lines
  sink:
    type: kafka
    brokers: "${KAFKA_BROKERS:-localhost:9094}"
    topic: sonda-logs

scenarios:
  - signal_type: logs
    name: app_logs_kafka
    log_generator:
      type: template
      templates:
        - message: "Event from {service} severity {level}"
          field_pools:
            service: ["auth", "api", "worker"]
            level: ["INFO", "WARN", "ERROR"]
      severity_weights:
        info: 0.7
        warn: 0.2
        error: 0.1
