apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sonda.fullname" . }}
  labels:
    {{- include "sonda.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sonda.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sonda.selectorLabels" . | nindent 8 }}
      {{- if .Values.scenarios }}
      annotations:
        checksum/scenarios: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "sonda.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.server.auth.enabled .Values.server.auth.existingSecret }}
          env:
            - name: SONDA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.auth.existingSecret }}
                  key: {{ .Values.server.auth.secretKey }}
          {{- end }}
          args:
            - "--port"
            - {{ .Values.server.port | quote }}
            - "--bind"
            - {{ .Values.server.bind | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.scenarios }}
          volumeMounts:
            - name: scenarios
              mountPath: /scenarios
              readOnly: true
          {{- end }}
      {{- if .Values.scenarios }}
      volumes:
        - name: scenarios
          configMap:
            name: {{ include "sonda.fullname" . }}-scenarios
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
