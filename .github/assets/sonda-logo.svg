<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sonda">
  <title>Sonda</title>
  <!-- Square-wave S: digital-scope flavour. Lime stroke on midnight rounded
       square — self-contained so it reads on any GitHub background. -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <path d="M 52 12
           L 14 12
           L 14 32
           L 50 32
           L 50 52
           L 12 52"
        fill="none"
        stroke="#a3e635"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
