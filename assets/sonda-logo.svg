<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sonda">
  <title>Sonda</title>
  <!-- Square-wave S: digital-scope flavour. Coral stroke baked in so it
       renders correctly when loaded via <img> (where currentColor would
       resolve to black, not the header text color). -->
  <path d="M 52 12
           L 14 12
           L 14 32
           L 50 32
           L 50 52
           L 12 52"
        fill="none"
        stroke="#fdba74"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
